name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app
        run: |
          pyinstaller --windowed \
            --name "PDF Color Separator" \
            --collect-all PyQt6 \
            --collect-all fitz \
            --collect-all pikepdf \
            --noupx \
            --paths src \
            src/main.py

      - name: Fix pikepdf .dylibs layout and ad-hoc sign .app
        run: |
          APP="dist/PDF Color Separator.app"
          # pikepdf vendors qpdf into a hidden .dylibs/ dir (wheel convention).
          # codesign mistakes it for a nested bundle and aborts. Rename it and
          # patch the @rpath so the extension module still finds its libraries.
          find "$APP" -type d -name ".dylibs" | while IFS= read -r dir; do
            newdir="$(dirname "$dir")/dylibs"
            mv "$dir" "$newdir"
            parent="$(dirname "$newdir")"
            find "$parent" -maxdepth 1 \( -name "*.so" -o -name "*.dylib" \) | while IFS= read -r lib; do
              install_name_tool -rpath "@loader_path/.dylibs" "@loader_path/dylibs" "$lib" 2>/dev/null || true
            done
          done
          # Sign all bundled binaries individually, then sign the app bundle.
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --force --sign - {} \;
          codesign --force --sign - "$APP"

      - name: Zip .app
        run: ditto -c -k --sequesterRsrc --keepParent "dist/PDF Color Separator.app" PDF_Color_Separator_macOS.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF_Color_Separator_macOS.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          pyinstaller --windowed \
            --name "PDF Color Separator" \
            --collect-all PyQt6 \
            --collect-all fitz \
            --collect-all pikepdf \
            --paths src \
            src/main.py

      - name: Zip executable
        run: cd dist && zip -r ../PDF_Color_Separator_Linux.zip "PDF Color Separator"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF_Color_Separator_Linux.zip
