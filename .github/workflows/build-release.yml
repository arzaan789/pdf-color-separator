name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app
        run: |
          pyinstaller --windowed \
            --name "PDF Color Separator" \
            --collect-all PyQt6 \
            --collect-all fitz \
            --collect-all pikepdf \
            --paths src \
            src/main.py

      - name: Zip .app
        run: cd dist && zip -r ../PDF_Color_Separator_macOS.zip "PDF Color Separator.app"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF_Color_Separator_macOS.zip

  build-linux:
    runs-on: ubuntu-22.04
    container: python:3.11-slim-bullseye  # Debian 11, GLIBC 2.31, Python 3.11 pre-installed
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -q
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            libgl1 libglib2.0-0 \
            libxkbcommon-x11-0 libdbus-1-3 libxcb-cursor0 \
            zip

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          python -m PyInstaller --windowed \
            --name "PDF Color Separator" \
            --collect-all PyQt6 \
            --collect-all fitz \
            --collect-all pikepdf \
            --paths src \
            src/main.py

      - name: Zip executable
        run: cd dist && zip -r ../PDF_Color_Separator_Linux.zip "PDF Color Separator"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF_Color_Separator_Linux.zip
