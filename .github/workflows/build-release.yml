name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app
        run: |
          pyinstaller --windowed \
            --name "PDF Color Separator" \
            --collect-all PyQt6 \
            --collect-all fitz \
            --collect-all pikepdf \
            --paths src \
            src/main.py

      - name: Zip .app
        run: cd dist && zip -r ../PDF_Color_Separator_macOS.zip "PDF Color Separator.app"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF_Color_Separator_macOS.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libxcb-cursor0

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Build with PyInstaller
        run: |
          pyinstaller --windowed \
            --name "pdf-color-separator" \
            --collect-all PyQt6 \
            --collect-all fitz \
            --collect-all pikepdf \
            --paths src \
            src/main.py

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/pdf-color-separator/. AppDir/usr/bin/

          python3 - << 'PYEOF'
          import os, stat
          from PIL import Image

          # AppRun — entry point script the AppImage executes
          apprun = (
            '#!/bin/bash\n'
            'HERE="$(dirname "$(readlink -f "${0}")")"\n'
            'exec "${HERE}/usr/bin/pdf-color-separator" "$@"\n'
          )
          with open('AppDir/AppRun', 'w') as f:
              f.write(apprun)
          os.chmod('AppDir/AppRun',
              stat.S_IRWXU | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH)

          # .desktop file — required by AppImage spec
          desktop = (
            '[Desktop Entry]\n'
            'Name=PDF Color Separator\n'
            'Exec=pdf-color-separator\n'
            'Icon=pdf-color-separator\n'
            'Type=Application\n'
            'Categories=Graphics;Office;\n'
          )
          with open('AppDir/pdf-color-separator.desktop', 'w') as f:
              f.write(desktop)

          # Icon — required by AppImage spec (256x256 PNG)
          Image.new('RGBA', (256, 256), (70, 130, 180)).save('AppDir/pdf-color-separator.png')
          PYEOF

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage \
            --appimage-extract-and-run \
            AppDir PDF_Color_Separator_Linux.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PDF_Color_Separator_Linux.AppImage
